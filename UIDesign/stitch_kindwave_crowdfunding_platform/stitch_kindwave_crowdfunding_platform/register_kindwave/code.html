<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Register - KindWave</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#002109",
                        "tertiary-fixed": "#ffdbca",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary-fixed-variant": "#783200",
                        "on-primary": "#ffffff",
                        "on-background": "#0b1c30",
                        "on-tertiary-container": "#6d2d00",
                        "error-container": "#ffdad6",
                        "tertiary": "#9d4300",
                        "on-secondary-container": "#fefcff",
                        "surface": "#f8f9ff",
                        "outline": "#6d7b6c",
                        "on-primary-fixed-variant": "#005321",
                        "primary-container": "#22c55e",
                        "inverse-on-surface": "#eaf1ff",
                        "primary-fixed": "#6bff8f",
                        "outline-variant": "#bccbb9",
                        "surface-container": "#e5eeff",
                        "surface-container-high": "#dce9ff",
                        "on-surface-variant": "#3d4a3d",
                        "inverse-surface": "#213145",
                        "secondary-fixed-dim": "#adc6ff",
                        "primary-fixed-dim": "#4ae176",
                        "tertiary-container": "#ff8e4d",
                        "primary": "#006e2f",
                        "surface-tint": "#006e2f",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#d8e2ff",
                        "on-surface": "#0b1c30",
                        "background": "#f8f9ff",
                        "surface-dim": "#cbdbf5",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "secondary-container": "#2170e4",
                        "inverse-primary": "#4ae176",
                        "on-tertiary-fixed": "#341100",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb690",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-fixed": "#001a42",
                        "on-secondary-fixed-variant": "#004395",
                        "on-primary-container": "#004b1e",
                        "secondary": "#0058be",
                        "error": "#ba1a1a",
                        "surface-bright": "#f8f9ff",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "sm": "12px",
                        "base": "8px",
                        "xl": "80px",
                        "md": "24px",
                        "lg": "48px",
                        "max-width": "1280px",
                        "margin-desktop": "32px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]

                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- Navbar Suppressed: Transactional Screen (Registration) -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop py-xl">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant p-lg flex flex-col gap-md">
<div class="text-center mb-md">
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Join KindWave</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Start making a difference today.</p>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="person">person</span>
<input class="w-full pl-10 pr-sm py-sm rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder-on-surface-variant/50 transition-shadow outline-none" id="fullName" placeholder="Jane Doe" required="" type="text">
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-sm py-sm rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder-on-surface-variant/50 transition-shadow outline-none" id="email" placeholder="jane@example.com" required="" type="email">
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="phone">phone</span>
<input class="w-full pl-10 pr-sm py-sm rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder-on-surface-variant/50 transition-shadow outline-none" id="phone" placeholder="+1 (555) 000-0000" required="" type="tel">
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-sm py-sm rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder-on-surface-variant/50 transition-shadow outline-none" id="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-sm py-sm rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder-on-surface-variant/50 transition-shadow outline-none" id="confirmPassword" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="flex items-center gap-sm mt-xs">
<input class="rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest h-4 w-4" id="terms" required="" type="checkbox">
<label class="font-label-sm text-label-sm text-on-surface-variant font-normal" for="terms">
                        I accept the <a class="text-primary hover:underline font-semibold" href="#">Terms and Conditions</a> and <a class="text-primary hover:underline font-semibold" href="#">Privacy Policy</a>.
                    </label>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm rounded-lg shadow-sm hover:shadow-[0_8px_30px_rgba(0,0,0,0.08)] hover:-translate-y-0.5 transition-all duration-200 mt-sm flex items-center justify-center gap-xs" type="submit">
                    Register
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-md text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant font-normal">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Footer Suppressed: Transactional Screen (Registration) -->
</body></html>
