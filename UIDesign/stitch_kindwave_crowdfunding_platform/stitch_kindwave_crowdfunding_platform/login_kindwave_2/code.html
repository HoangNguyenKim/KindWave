                    Welcome back
                </h2>
<p class="mt-2 font-body-md text-body-md text-on-surface-variant">
                    Nurturing our shared future, one wave at a time.
                </p>
<div class="mt-10">
<div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface" for="email">Email address</label>
<div class="mt-2">
<input autocomplete="email" class="block w-full rounded-lg border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant placeholder:text-on-surface-variant focus:ring-2 focus:ring-inset focus:ring-primary font-body-md text-body-md transition-shadow bg-surface-bright" id="email" name="email" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="mt-2 relative">
<input autocomplete="current-password" class="block w-full rounded-lg border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant placeholder:text-on-surface-variant focus:ring-2 focus:ring-inset focus:ring-primary font-body-md text-body-md transition-shadow bg-surface-bright" id="password" name="password" required="" type="password">
</div>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-between mt-4">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-bright cursor-pointer" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-3 block font-label-md text-label-md text-on-surface-variant cursor-pointer" for="remember-me">Remember me</label>
</div>
<div class="font-label-md text-label-md">
<a class="font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="flex w-full justify-center rounded-lg bg-primary px-4 py-3 font-label-md text-label-md font-semibold text-on-primary shadow-sm hover:bg-primary-container focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all active:scale-[0.98]" type="submit">
                                    Login
                                </button>
</div>
</form>
</div>
<!-- Divider -->
<div class="mt-8">
<div class="relative">
