<!-- Card Container -->

<div class="p-md md:p-lg border-b border-outline-variant/20 text-center">
<a class="inline-block mb-md" href="#">
<span class="font-headline-md text-headline-md font-bold text-primary">KindWave</span>
</a>
<h1 class="font-headline-lg text-headline-lg mb-base text-on-surface">Reset your password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we'll send you a link to reset your password.</p>
</div>
<!-- Form Area -->
<div class="p-md md:p-lg">
<form action="#" class="space-y-md" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="email" name="email" placeholder="you@example.com" required="" type="email">
</div>
</div>
<div class="pt-sm">
<button class="w-full flex justify-center py-sm px-md border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">

                        </button>
</div>
</form>
</div>
<!-- Footer Area -->
<div class="bg-surface-container/50 px-md py-sm border-t border-outline-variant/20 text-center">
<a class="font-label-md text-label-md text-secondary hover:text-secondary-container transition-colors inline-flex items-center gap-xs" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
                    Back to log in
                </a>
</div>
</div>
