version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kindwave_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kindwave
      MYSQL_USER: kindwave_user
      MYSQL_PASSWORD: kindwave_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: kindwave_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: kindwave_user
      PMA_PASSWORD: kindwave_password
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: kindwave_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
